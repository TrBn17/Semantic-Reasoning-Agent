# Full stack: Postgres, Redis, Neo4j + API + Celery worker + Next.js frontend.
# Chạy từ repo root:
#   docker compose -f infrastructure/docker/docker-compose.yml up -d
#
# URLs: API http://localhost:8000  |  Frontend http://localhost:3000

name: semantic-reasoning

services:
  postgres:
    image: postgres:16
    container_name: semantic-reasoning-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-semantic_reasoning}
      POSTGRES_USER: ${POSTGRES_USER:-semantic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-semantic}
    ports:
      - "${POSTGRES_BIND_HOST:-127.0.0.1}:${POSTGRES_PUBLISHED_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U semantic -d semantic_reasoning"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: semantic-reasoning-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5
    container_name: semantic-reasoning-neo4j
    environment:
      NEO4J_AUTH: neo4j/semantic-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -a bolt://localhost:7687 -u neo4j -p semantic-neo4j 'RETURN 1;' || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: semantic-reasoning-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/semantic-artifacts;
      mc anonymous set download local/semantic-artifacts;
      exit 0;
      "

  qdrant:
    image: qdrant/qdrant:latest
    container_name: semantic-reasoning-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -lc '</dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: python:3.11-slim
    container_name: semantic-reasoning-api
    working_dir: /workspace
    command: >
      sh -c "pip install --no-cache-dir -e '.[dev]'
      && sh apps/backend/entrypoint.sh"
    volumes:
      - ../..:/workspace
    ports:
      - "8000:8000"
    environment:
      UVICORN_RELOAD: "false"
      APP_ENV: development
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+psycopg://semantic:semantic@postgres:5432/semantic_reasoning}
      DATABASE_ECHO: "false"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_TASK_ALWAYS_EAGER: "false"
      CELERY_TASK_EAGER_PROPAGATES: "false"
      NEO4J_ENABLED: "true"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: semantic-neo4j
      NEO4J_DATABASE: neo4j
      DEFAULT_WORKSPACE_ID: workspace-demo
      OBJECT_STORE_BACKEND: postgres
      OBJECT_STORE_BUCKET: semantic-artifacts
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      VECTOR_STORE_BACKEND: postgres
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_NAME: document_chunks
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  worker:
    image: python:3.11-slim
    container_name: semantic-reasoning-worker
    working_dir: /workspace
    command: >
      sh -c "pip install --no-cache-dir -e '.[dev]'
      && sh apps/backend/worker-entrypoint.sh"
    volumes:
      - ../..:/workspace
    environment:
      APP_ENV: development
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+psycopg://semantic:semantic@postgres:5432/semantic_reasoning}
      DATABASE_ECHO: "false"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_TASK_ALWAYS_EAGER: "false"
      CELERY_TASK_EAGER_PROPAGATES: "false"
      NEO4J_ENABLED: "true"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: semantic-neo4j
      NEO4J_DATABASE: neo4j
      DEFAULT_WORKSPACE_ID: workspace-demo
      OBJECT_STORE_BACKEND: postgres
      OBJECT_STORE_BUCKET: semantic-artifacts
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      VECTOR_STORE_BACKEND: postgres
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_NAME: document_chunks
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      api:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: semantic-reasoning-frontend
    working_dir: /workspace/apps/frontend
    command: >
      sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm install; fi && npm run dev"
    volumes:
      - ../..:/workspace
      - frontend_node_modules:/workspace/apps/frontend/node_modules
      - frontend_next_cache:/workspace/apps/frontend/.next
    ports:
      - "3000:3000"
    environment:
      # SSR trong container: gọi API theo tên service Docker
      INTERNAL_API_BASE_URL: http://api:8000/api/v1
      # Trình duyệt trên máy host: cùng origin public
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  neo4j_data:
  minio_data:
  qdrant_data:
  frontend_node_modules:
  frontend_next_cache:
