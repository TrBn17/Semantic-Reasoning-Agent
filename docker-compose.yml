# Canonical compose file at repo root for local development.
# Run from repo root:
#   docker compose up -d
#
# URLs: API http://localhost:8000 | Frontend http://localhost:3000

name: semantic-reasoning

x-backend-env-file: &backend-env-file
  - .env

x-backend-environment: &backend-environment
  APP_ENV: ${APP_ENV:-development}
  APP_NAME: ${APP_NAME:-Semantic Reasoning Agent}
  API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
  CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
  CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}
  DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+psycopg://semantic:semantic@postgres:5432/semantic_reasoning}
  DATABASE_ECHO: ${DATABASE_ECHO:-false}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL_DOCKER:-redis://redis:6379/0}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND_DOCKER:-redis://redis:6379/1}
  CELERY_TASK_ALWAYS_EAGER: ${CELERY_TASK_ALWAYS_EAGER:-false}
  CELERY_TASK_EAGER_PROPAGATES: ${CELERY_TASK_EAGER_PROPAGATES:-false}
  NEO4J_ENABLED: ${NEO4J_ENABLED:-true}
  NEO4J_URI: ${NEO4J_URI_DOCKER:-bolt://neo4j:7687}
  NEO4J_USER: ${NEO4J_USER:-neo4j}
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-semantic-neo4j}
  NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
  DEFAULT_WORKSPACE_ID: ${DEFAULT_WORKSPACE_ID:-workspace-demo}
  DEFAULT_WORKSPACE_NAME: ${DEFAULT_WORKSPACE_NAME:-Demo Workspace}
  DEFAULT_USER_ID: ${DEFAULT_USER_ID:-user-demo}
  DEFAULT_USER_EMAIL: ${DEFAULT_USER_EMAIL:-demo@example.com}
  DEFAULT_USER_NAME: ${DEFAULT_USER_NAME:-Demo User}
  DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-echo}
  DEFAULT_MODEL: ${DEFAULT_MODEL:-local-echo}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
  GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL_DOCKER:-http://host.docker.internal:11434}
  ONTOLOGY_LLM_PROVIDER: ${ONTOLOGY_LLM_PROVIDER:-anthropic}
  ONTOLOGY_LLM_MODEL: ${ONTOLOGY_LLM_MODEL:-claude-sonnet-4-5}
  ONTOLOGY_PROMPT_VERSION: ${ONTOLOGY_PROMPT_VERSION:-v1}
  ONTOLOGY_CHUNK_LIMIT: ${ONTOLOGY_CHUNK_LIMIT:-24}
  ONTOLOGY_LLM_ENABLED: ${ONTOLOGY_LLM_ENABLED:-true}
  OBJECT_STORE_BACKEND: ${OBJECT_STORE_BACKEND:-minio}
  OBJECT_STORE_BUCKET: ${OBJECT_STORE_BUCKET:-semantic-artifacts}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT_DOCKER:-minio:9000}
  MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL:-http://localhost:9000}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
  MINIO_SECURE: ${MINIO_SECURE:-false}
  VECTOR_STORE_BACKEND: ${VECTOR_STORE_BACKEND:-postgres}
  QDRANT_URL: ${QDRANT_URL_DOCKER:-http://qdrant:6333}
  QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-document_chunks}
  MARKER_MODEL_CACHE_DIR: ${MARKER_MODEL_CACHE_DIR:-/workspace/.cache/datalab/models}

services:
  postgres:
    image: postgres:16
    container_name: semantic-reasoning-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-semantic_reasoning}
      POSTGRES_USER: ${POSTGRES_USER:-semantic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-semantic}
    ports:
      - "${POSTGRES_BIND_HOST:-127.0.0.1}:${POSTGRES_PUBLISHED_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-semantic} -d ${POSTGRES_DB:-semantic_reasoning}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: semantic-reasoning-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5.26.0
    container_name: semantic-reasoning-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-semantic-neo4j}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -a bolt://localhost:7687 -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-semantic-neo4j} 'RETURN 1;' || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: semantic-reasoning-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/${OBJECT_STORE_BUCKET:-semantic-artifacts};
      mc anonymous set download local/${OBJECT_STORE_BUCKET:-semantic-artifacts};
      exit 0;
      "

  qdrant:
    image: qdrant/qdrant:latest
    container_name: semantic-reasoning-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -lc '</dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    image: semantic-reasoning-api
    container_name: semantic-reasoning-api
    working_dir: /workspace
    command: sh apps/backend/entrypoint.sh
    volumes:
      - .:/workspace
    ports:
      - "8000:8000"
    env_file: *backend-env-file
    environment:
      <<: *backend-environment
      UVICORN_RELOAD: ${UVICORN_RELOAD:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  worker:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    image: semantic-reasoning-api
    container_name: semantic-reasoning-worker
    working_dir: /workspace
    command: sh apps/backend/worker-entrypoint.sh
    volumes:
      - .:/workspace
    env_file: *backend-env-file
    environment:
      <<: *backend-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      api:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    image: semantic-reasoning-frontend
    container_name: semantic-reasoning-frontend
    working_dir: /workspace/apps/frontend
    command: sh -c "if [ ! -x node_modules/.bin/next ]; then npm install; fi; npm run dev"
    volumes:
      - ./apps/frontend:/workspace/apps/frontend
      - frontend_node_modules:/workspace/apps/frontend/node_modules
      - frontend_next_cache:/workspace/apps/frontend/.next
    ports:
      - "3000:3000"
    environment:
      INTERNAL_API_BASE_URL: http://api:8000/api/v1
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  neo4j_data:
  minio_data:
  qdrant_data:
  frontend_node_modules:
  frontend_next_cache:
